name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: chmod +x dev/agent/check-fast dev/agent/check-full dev/agent/context-check dev/agent/dev-status
      - run: dev/agent/check-fast

